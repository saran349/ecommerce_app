{% extends "base.html" %}
{% block title %}{{ product.name }} — ShopEasy{% endblock %}

{% block content %}
  <div class="product-detail">
    <img src="{{ product.image_url }}" alt="{{ product.name }}">
    <div class="product-info">
      <h1>{{ product.name }}</h1>
      <p class="category-tag">{{ product.category }}</p>
      <p class="description">{{ product.description }}</p>
      <p class="price">&#8377;{{ "%.2f"|format(product.price) }}</p>
      <p class="stock">{{ product.stock }} in stock</p>

      <div class="qty-selector">
        <label for="qty">Quantity:</label>
        <input type="number" id="qty" min="1" max="{{ product.stock }}" value="1">
      </div>

      <button class="btn-add-cart btn-large" data-product-id="{{ product.id }}" data-qty-input="qty">
        Add to Cart
      </button>
    </div>
  </div>
{% endblock %}
